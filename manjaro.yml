---
- hosts: device
  tasks:
    - name: Install packages
      pacman:
        name: "{{ packages }}"
      vars:
        packages:
          - arp-scan
          - b3sum
          - bash
          - bat
          - bc
          - bind
          - boost
          - bzip2
          - chromium
          - chrony
          - clang
          - cmake
          - cpio
          - cronie
          - curl
          - dmidecode
          - dos2unix
          - dua-cli
          - dust
          - enscript
          - ethtool
          - fastfetch
          - fd
          - fish
          - fping
          - gawk
          - gcc
          - git
          - git-delta
          - gitui
          - glib2
          - go
          - grep
          - gzip
          - helix
          - htop
          - hwloc
          - hyperfine
          - iotop
          - iperf3
          - jdk-openjdk
          - keepassxc
          - kitty
          - ksh
          - less
          - lftp
          - lsof
          - make
          - masscan
          - ncdu
          - neovim
          - net-tools
          - ninja
          - nmap
          - openssh
          - openssl
          - p7zip
          - parted
          - pbzip2
          - perl
          - pigz
          - pixz
          - plocate
          - procps-ng
          - procs
          - python
          - python-boto3
          - python-jinja
          - python-pip
          - python-psutil
          - python-pytest
          - python-requests
          - python-six
          - python-virtualenv
          - python-yaml
          - ranger
          - ripgrep
          - rsync
          - ruby
          - ruby-irb
          - screen
          - sed
          - shellcheck
          - shfmt
          - strace
          - subversion
          - sudo
          - sysstat
          - tar
          - tcpdump
          - the_silver_searcher
          - tmux
          - tokei
          - ttf-fira-code
          - uv
          - vim
          - wget
          - xz
          - zig
          - zsh
          - zstd
    - name: Enable/start services
      service:
        name: "{{ item }}"
        enabled: true
        state: started
      with_items:
        - chronyd
        - cronie
        - sshd
        - sysstat
